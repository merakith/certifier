specVersion: 0.0.5
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum
    name: CertificateNFT
    network: mainnet
    source:
      address: "0x5FbDB2315678afecb367f032d93F642f64180aa3"
      abi: CertificateNFT
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Certificate
      abis:
        - name: CertificateNFT
          file: CertificateNFT/CertificateNFT.json
      eventHandlers:
        - event: CertificateMinted(indexed address,indexed uint256,string)
          handler: handleCertificateMinted
        - event: CertificateRevoked(indexed uint256)
          handler: handleCertificateRevoked
      file: CertificateNFT/CertificateNFT.wasm
